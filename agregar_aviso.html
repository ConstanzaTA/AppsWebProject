<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michis buxef</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1> Agrega tu aviso! </h1>
    <!--Javascript útiles -->
    <script src="agregar_aviso_dynamics.js"></script>
    <script src="agregar_aviso_validation.js"></script>
        <nav class="navbar">
        <div class="navbar_container">
            <a href="/" id="navbar_logo"></a>
            <div class="navbar_toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar_menu">
                <li class="navbar_item">
                    <a href="index.html" class="navbar_links"> Home </a>
                </li>
                <li class="navbar_item">
                    <a href="agregar_aviso.html" class="navbar_links"> Agregar aviso de adopción </a>
                </li>
                 <li class="navbar_item">
                    <a href="listado_adopciones.html" class="navbar_links"> Ver listado de adopciones </a>
                </li>
                 <li class="navbar_item">
                    <a href="estadisticas.html" class="navbar_links"> Estadísticas </a>
                </li> 
            </ul>
        </div>
    </nav>
    <Form>
        <fieldset> 
            <legend> ¿Dónde? </legend>
            
            <label for="regionMenu"> Región: </label>
            <select name="Región" id="regionMenu" onchange = "updateComunaMenu(this.value)">
                <option value=""> Seleccione una región </option>
                <option value= "Región_Metropolitana"> Región Metropolitana </option>
                <option value= "Arica_y_Parinacota" > Arica y Parinacota </option>
                <option value= "Tarapacá"> Tarapacá </option>
                <option value= "Antofagasta"> Antofagasta </option>
                <option value= "Atacama" > Atacama </option>
                <option value= "Coquimbo" > Coquimbo </option>
                <option value= "Valparaiso"> Valparaiso </option>
                <option value= "OHiggins" > O'Higgins </option>
                <option value= "Maule" > Maule </option>
                <option value= "Ñuble"> Ñuble </option>
                <option value= "Biobío"> Biobío </option>
                <option value= "La_Araucanía"> La Araucanía </option>
                <option value= "Los_Ríos" > Los Ríos </option>
                <option value= "Los_Lagos" > Los Lagos </option>
                <option value= "Aysén" > Aysén </option>
                <option value= "Magallanes_y_la_Antártica_Chilena"> Magallanes y la Antártica Chilena </option>
            </select>
            <span id="errorRegionMessage" style="color: red; display: none;"></span>
            <br><br> 
            <label for="comunaMenu"> Comuna: </label>
            <select name="Comuna" id="comunaMenu" disabled>
                <option value=""> Seleccione una comuna </option>
            </select>
            <span id="errorComunaMessage" style="color: red; display: none;"></span>
            <br><br> 
            <label for="Sector"> Sector: </label>
            <input type="text" name="Sector" id="Sector" maxlength="100">
         </fieldset>
            
         <br>

        <fieldset>  
            <legend> ¿Contacto de esta publicación? </legend>
            
            <label for="Nombre"> Nombre: </label>
            <input type="text" name="Nombre" id="Nombre" maxlength="200">
            <span id="errorNombreMessage" style="color: red; display: none;"></span>
            <br><br>
            <label for="email"> email: </label>
            <input type="email" name="email" id="email" >
            <span id="errorEmailMessage" style="color: red; display: none;"></span>
            <br><br>
            <label for="Numero_de_celular"> Numero de celular: </label>
            <input type="tel" name="Numero_de_celular" id="Numero_de_celular">
            <br><br>
            <label for="Contactar"> Contactar por: </label>
            <select name="Contactar" id="Contactar">
                <option value=""> Seleccione un medio para contactarle </option>
                <option value=""> whatsapp </option>
                <option value=""> telegram </option>
                <option value=""> X </option>
                <option value=""> instagram </option>
                <option value=""> otra </option>
            </select>
            <!--Hacer el código en dynamics para que salga el input de texto para el id de contacto o url-->
        </fieldset>

        <br>

        <fieldset> 
            <legend> ¿Qué mascota ofrece en adopción? </legend>
            
            <label for="Tipo"> Tipo: </label>
            <select name="Tipo" id="Tipo">
                <option value=""> Seleccione el tipo de animal </option>
                <option value="Perro"> Perro </option>
                <option value="Gato"> Gato </option>
            </select>
            <span id="errorTipoMessage" style="color: red; display: none;"></span>
            <br><br>
            <label for="Cantidad"> Cantidad: </label>
            <input type="number" name="Cantidad" id="Cantidad" min="1">
            <span id="errorCantidadMessage" style="color: red; display: none;"></span>
            <br><br>
            <label for="Edad"> Edad: </label>
            <input type="number" name="Edad" id="Edad" min="1">
            <span id="errorEdadMessage" style="color: red; display: none;"></span>
            <br><br>
            <label for="Unidad_Medida_Edad"> Unidad Medida Edad: </label>
            <select name="Unidad_Medida_Edad" id="Unidad_Medida_Edad">
                <option value=""> Seleccione la unidad de medida de edad </option>
                <option value="meses"> meses </option>
                <option value="años"> años </option>
            </select>
            <span id="errorUMEMessage" style="color: red; display: none;"></span>
            <br><br>
            <label for="Fecha_disponible"> Fecha disponible para entrega: </label>
            <input type="datetime-local" name="Fecha_disponible" id="Fecha_disponible">
            <br><br>
            <label for="Descripción"> Descripción: </label>
            <textarea name="Descripción" id="Descripción" cols="50" rows="10"></textarea>
            <br><br>
            <label for="Foto"> Foto: </label>
            <input type="file" name="Foto" id="Foto">
            <!--Falta que se pueda agregar múltiples fotos-->
        </fieldset>
        <br>
        <button type="submit" onclick="validateAll()"> Agregar este aviso de adopción </button>
    </Form>
    <script src="agregar_aviso_validation.js"></script>
</body>
</html>
